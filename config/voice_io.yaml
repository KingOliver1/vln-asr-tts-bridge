# Parameters are loaded into the private namespace of voice_io_node.

input_text_topic: /vln/voice_input_text
output_text_topic: /vln/voice_output_text

# local, openai, or dashscope. They can be selected independently.
asr_backend: local
tts_backend: local

language: zh
sample_rate: 48000
channels: 1
audio_capture_backend: parec
input_device: alsa_input.pci-0000_06_00.6.HiFi__hw_acp__source

# Energy-based utterance detection. RMS is normalized to 0.0 - 1.0.
block_duration_ms: 30
start_threshold: 0.010
stop_threshold: 0.004
start_trigger_blocks: 3
vad_remove_dc_offset: true
pre_roll_sec: 0.35
end_silence_sec: 0.8
min_utterance_sec: 0.35
max_utterance_sec: 8.0
cooldown_sec: 0.4
publish_empty_result: false
pause_listening_while_speaking: true
cloud_asr_remove_dc_offset: true

local:
  # Required for local ASR. Example:
  # models/vosk-model-small-cn-0.22
  vosk_model_path: models/vosk-model-cn-0.22
  # For local Vosk, use Vosk endpoint detection instead of RMS VAD.
  # This is more reliable on the current digital microphone input.
  vosk_streaming: true

  # Optional for local TTS. If empty, fallback_tts_cmd is used.
  piper_executable: tools/piper/piper
  piper_model_path: models/piper/zh_CN_huayan_medium/zh_CN-huayan-medium.onnx
  piper_config_path: models/piper/zh_CN_huayan_medium/zh_CN-huayan-medium.onnx.json

  # Commands are argv lists, not shell strings. Placeholders:
  # {audio_file}: generated speech audio path
  # {text}: text to speak
  audio_player_cmd:
    - ffplay
    - -nodisp
    - -autoexit
    - -loglevel
    - error
    - "{audio_file}"
  fallback_tts_cmd:
    - spd-say
    - "{text}"

parec:
  executable: parec

openai:
  api_key_env: OPENAI_API_KEY
  base_url_env: OPENAI_BASE_URL
  base_url: ""
  asr_model: gpt-4o-mini-transcribe
  tts_model: gpt-4o-mini-tts
  tts_voice: alloy
  tts_format: wav

dashscope:
  api_key_env: DASHSCOPE_API_KEY
  base_http_api_url: https://dashscope.aliyuncs.com/api/v1
  workspace: ""

  # Cloud ASR: Alibaba Cloud Model Studio / DashScope Fun-ASR.
  # The recorded audio is uploaded to temporary OSS, then submitted as an async task.
  asr_model: fun-asr-mtl
  asr_language_hints:
    - zh
  asr_channel_id:
    - 0
  asr_upload_timeout_sec: 20.0
  asr_http_timeout_sec: 30.0
  asr_poll_interval_sec: 1.0
  asr_timeout_sec: 120.0

  # Cloud TTS: Qwen3-TTS Voice Design target model.
  # If tts_voice is empty, the node creates a voice from tts_voice_prompt at startup.
  # To avoid creating a new cloud voice on every launch, set tts_voice to a saved voice_id.
  tts_model: qwen3-tts-vd-2026-01-26
  tts_voice: ""
  tts_language_type: ""
  tts_format: wav
  tts_sample_rate: 24000
  tts_voice_prompt: "清晰、自然、简洁的中文导航播报女声，语速适中，适合机器人到达目的地提示。"
  tts_voice_preferred_name: trailer_voice
  tts_voice_preview_text: "已经到达目的地啦"
  tts_voice_language: zh
  tts_voice_sample_rate: 24000
